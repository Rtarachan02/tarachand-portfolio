# Render Blueprint (Infrastructure as Code) — see https://render.com/docs/blueprint-spec
#
# Notes:
# - Redis is intentionally NOT provisioned here: nothing in the codebase uses it yet
#   (rate limiting runs in-memory via slowapi), and Render no longer offers a free Redis
#   tier. Add a `type: redis` service here if/when a real caching need shows up.
# - The free Postgres plan is deleted by Render after ~30 days. Fine for an initial
#   deploy/demo; upgrade the plan before that matters for real use.
# - CORS_ORIGINS, OAUTH_REDIRECT_BASE_URL, and VITE_API_URL all reference the *other*
#   service's URL, which Render only assigns after first deploy — set these manually in
#   the Render dashboard once both services are up, then redeploy the backend.
# - Free-tier web services don't support preDeployCommand, so migrations instead run at
#   container startup (see backend/Dockerfile's CMD) — safe/idempotent on every restart.

databases:
  - name: portfolio-postgres
    plan: free
    databaseName: portfolio
    user: portfolio

services:
  - type: web
    name: portfolio-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: OAUTH_REDIRECT_BASE_URL
        sync: false
      - key: ALLOWED_ADMIN_EMAILS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false

  - type: web
    name: portfolio-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
